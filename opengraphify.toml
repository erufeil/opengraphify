[backend]
# Local inference via Ollama (default). To use OpenRouter, set:
#   provider = "openrouter"
#   base_url = "https://openrouter.ai/api/v1"
#   model    = "mistralai/mistral-7b-instruct"
#   api_key  = "sk-or-..."   # or set OPENGRAPHIFY_API_KEY env var
provider = "ollama"
# Small + fast by default so a local CPU/iGPU machine doesn't melt on big repos.
# Bump to qwen2.5-coder:7b (or larger) if you have a real GPU.
model    = "qwen2.5-coder:7b"
base_url = "http://localhost:11434/v1"
api_key  = ""

[schedule]
# Interval used in --watch daemon mode
interval_minutes = 15

[output]
# Must match graphify's out_dir so they share manifest.json and graph.json
out_dir         = "graphify-out"
generate_html   = true
generate_report = true

[extraction]
# Semantic-extraction tuning for small local models. Lower = lighter/faster per
# chunk (and cooler), at the cost of more chunks. These two together keep
# Ollama's num_ctx near its 8k floor.
token_budget      = 4000   # input tokens packed per LLM chunk
max_output_tokens = 2048   # cap on generated tokens (exported as GRAPHIFY_MAX_OUTPUT_TOKENS)
force_json        = true    # force valid JSON output (small models otherwise reply in prose)
max_retry_depth   = 1       # bisect+retry depth for empty/failed chunks (0 = no retries; graphify default 3)
# Per-request timeout (seconds) to the LLM backend. graphify's default is 600s
# (10 min); on a local/LAN Ollama with a real GPU a healthy chunk finishes in
# seconds, so 600s just means a stalled request freezes the cursor for 10 min
# before it gives up. 180s bounds that without cutting off legitimate work.
# Raise it only if a single chunk genuinely needs longer (huge model / no GPU).
api_timeout       = 180
# In-run retry for transient backend errors (Cloudflare 524, HTTP 429/5xx,
# connection resets). graphify only retries truncation, so without this a
# transient HTTP error drops the whole chunk until the next run. A retryable
# error waits the server's Retry-After (or retry_wait_seconds if none) and
# retries up to chunk_retries times before giving up. 0 = disable.
chunk_retries     = 2
retry_wait_seconds = 30
